<head>

<meta property="og:title" content="2027 미대 수시 전형 일정표 — 화강암플러스미술학원">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E53935;--red2:#ef5350;
  --bg:#f4f4f4;--card:#fff;--border:#e0e0e0;
  --ink:#111;--ink2:#555;--ink3:#999;
  --navy:#0d0d0d;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;height:56px;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 28px;z-index:1000;border-bottom:1px solid rgba(229,57,53,.2)}
.topbar-logo{color:#fff;font-size:13px;font-weight:900;letter-spacing:.5px;text-decoration:none}
.topbar-logo span{color:rgba(255,255,255,.35);font-weight:300;font-size:11px;margin-left:6px}
.topbar-back{color:rgba(255,255,255,.6);font-size:12px;text-decoration:none;border:1px solid rgba(255,255,255,.2);padding:6px 14px;border-radius:5px;transition:.15s}
.topbar-back:hover{color:#fff;border-color:rgba(255,255,255,.5)}

/* HERO */
.page-hero{background:var(--navy);padding:96px 32px 52px;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid rgba(229,57,53,.15)}
.page-hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(229,57,53,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(229,57,53,.07) 1px,transparent 1px);background-size:48px 48px;animation:gridFlow 10s linear infinite}
@keyframes gridFlow{0%{background-position:0 0}100%{background-position:48px 48px}}
.hero-label{font-size:11px;font-weight:700;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;position:relative}
.page-hero h1{font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:10px;position:relative}
.page-hero p{font-size:13px;color:rgba(255,255,255,.45);position:relative;line-height:1.7}
.hero-stats{display:flex;gap:40px;justify-content:center;margin-top:28px;position:relative}
.hero-stat-n{font-size:1.8rem;font-weight:900;color:#fff}
.hero-stat-n em{font-size:.85rem;color:var(--red);font-style:normal;margin-left:1px}
.hero-stat-l{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}

/* FILTER */
.wrap{max-width:1200px;margin:0 auto;padding:32px 24px 80px}
.filter-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin-bottom:24px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:5px}
.filter-group label{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.5px}
.filter-group select,.filter-group input{border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:13px;font-family:inherit;color:var(--ink);background:#fff;cursor:pointer;min-width:140px;transition:.15s}
.filter-group select:focus,.filter-group input:focus{border-color:var(--red);outline:none}
.filter-group input{min-width:200px}
.filter-right{margin-left:auto;display:flex;align-items:flex-end;gap:10px}
.filter-count{font-size:12px;color:var(--ink3);padding-bottom:2px}
.btn-reset{border:1px solid var(--border);background:#fff;border-radius:6px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:inherit;color:var(--ink2);transition:.15s}
.btn-reset:hover{border-color:#aaa;color:var(--ink)}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:8px;margin-bottom:20px;align-items:center}
.view-btn{border:1px solid var(--border);background:var(--card);border-radius:6px;padding:7px 16px;font-size:12px;cursor:pointer;font-family:inherit;color:var(--ink2);transition:.15s}
.view-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.result-summary{margin-left:auto;font-size:12px;color:var(--ink3)}

/* TABLE VIEW */
.table-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:10px}
table{width:100%;border-collapse:collapse;min-width:1000px}
thead th{background:#f8f8f8;font-size:11px;font-weight:700;color:var(--ink2);padding:12px 14px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0}
tbody tr{border-bottom:1px solid #f0f0f0;transition:.1s}
tbody tr:hover{background:#fafafa}
tbody td{padding:11px 14px;font-size:12.5px;vertical-align:top;color:var(--ink)}
.td-univ{font-weight:700;white-space:nowrap}
.td-dept{color:var(--ink2);font-size:12px;line-height:1.5}
.td-date{white-space:nowrap;font-size:12px}
.td-date.null{color:var(--ink3)}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.b-wonser{background:#e3f2fd;color:#1565c0}
.b-silgi{background:#fce4ec;color:#c62828}
.b-myeon{background:#f3e5f5;color:#6a1b9a}
.b-balpyo{background:#e8f5e9;color:#2e7d32}
.b-deungnok{background:#fff3e0;color:#e65100}
.b-chunwon{background:#fafafa;color:#555;border:1px solid #e0e0e0}

/* CARD VIEW */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.sched-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;transition:.15s}
.sched-card:hover{border-color:#ccc;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.sc-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.sc-univ{font-size:14px;font-weight:700;color:var(--ink)}
.sc-jeonhyeong{font-size:11px;color:var(--ink3);margin-top:2px}
.sc-count{font-size:11px;font-weight:700;color:var(--red);background:rgba(229,57,53,.08);padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.sc-dept{font-size:12px;color:var(--ink2);margin-bottom:12px;line-height:1.5}
.sc-timeline{display:flex;flex-direction:column;gap:6px}
.sc-row{display:flex;align-items:baseline;gap:8px}
.sc-row-label{font-size:11px;font-weight:700;color:var(--ink3);min-width:72px;flex-shrink:0}
.sc-row-val{font-size:12px;color:var(--ink);flex:1}
.sc-row-val.null{color:var(--ink3)}
.sc-row-val.highlight{color:var(--red);font-weight:700}
.sc-divider{height:1px;background:#f0f0f0;margin:8px 0}

/* TIMELINE VIEW */
.timeline-month{margin-bottom:36px}
.timeline-month-label{font-size:12px;font-weight:700;color:var(--red);letter-spacing:1.5px;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--red);display:flex;align-items:center;gap:8px}
.timeline-month-label span{font-size:11px;color:var(--ink3);font-weight:400}
.timeline-day{margin-bottom:16px}
.timeline-day-label{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.timeline-day-label .dow{font-size:10px;background:var(--bg);border:1px solid var(--border);padding:1px 6px;border-radius:4px}
.timeline-day-label .dow.weekend{color:var(--red);background:rgba(229,57,53,.06)}
.timeline-events{display:flex;flex-direction:column;gap:6px}
.tl-event{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;gap:12px;align-items:flex-start}
.tl-event-type{width:60px;flex-shrink:0}
.tl-event-univ{font-size:13px;font-weight:700;color:var(--ink)}
.tl-event-dept{font-size:12px;color:var(--ink2)}
.tl-event-time{font-size:11px;color:var(--ink3);margin-top:2px}

.no-result{text-align:center;padding:60px 20px;color:var(--ink3);font-size:14px}

@media(max-width:720px){
  .wrap{padding:24px 14px 60px}
  .filter-bar{gap:8px}
  .filter-group input{min-width:140px}
  .filter-group select{min-width:120px}
  .hero-stats{gap:20px}
  .hero-stat-n{font-size:1.4rem}
  .card-grid{grid-template-columns:1fr}
  .view-toggle{flex-wrap:wrap}
}
</style>
</head>

const DAYS = ['일','월','화','수','목','금','토'];
let currentView = 'card';

function fmt(d){
  if(!d||d==='미정'||d==='null') return null;
  const dt = new Date(d+'T00:00:00');
  if(isNaN(dt)) return d;
  return (dt.getMonth()+1)+'월 '+dt.getDate()+'일';
}
function fmtRange(s,e){
  const fs=fmt(s), fe=fmt(e);
  if(!fs) return null;
  if(!fe||fs===fe) return fs;
  return fs+' ~ '+fe;
}
function getMonth(d){
  if(!d||d==='미정') return null;
  return d.slice(5,7);
}
function getDow(d){
  if(!d||d==='미정') return '';
  const dt=new Date(d+'T00:00:00');
  return DAYS[dt.getDay()];
}
function isWeekend(d){
  if(!d) return false;
  const dt=new Date(d+'T00:00:00');
  return dt.getDay()===0||dt.getDay()===6;
}

function getTypeDate(item, type){
  if(type==='wonser') return item.원서접수_시작;
  if(type==='silgi') return item.실기날짜;
  if(type==='myeon') return item.면접날짜;
  if(type==='balpyo') return item.최종발표일;
  if(type==='deungnok') return item.등록_시작;
  if(type==='chunwon') return item.충원발표_시작;
  return item.원서접수_시작||item.실기날짜;
}

function filterData(){
  const univ=document.getElementById('fUniv').value;
  const type=document.getElementById('fType').value;
  const month=document.getElementById('fMonth').value;
  const search=document.getElementById('fSearch').value.toLowerCase().trim();

  return DATA.filter(d=>{
    if(univ && d.대학명!==univ) return false;
    if(search && !d.대학명.includes(search) && !d.모집단위.toLowerCase().includes(search) && !(d.전형명||'').toLowerCase().includes(search)) return false;
    if(type){
      const td=getTypeDate(d,type);
      if(!td||td==='미정') return false;
      if(month && !td.slice(5,7).startsWith(month)) return false;
    } else if(month){
      const dates=[d.원서접수_시작,d.실기날짜,d.면접날짜,d.최종발표일,d.등록_시작,d.충원발표_시작];
      if(!dates.some(x=>x&&x!=='미정'&&x.slice(5,7)===month)) return false;
    }
    return true;
  });
}

function setView(v){
  currentView=v;
  ['vCard','vTable','vTimeline'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById(v==='card'?'vCard':v==='table'?'vTable':'vTimeline').classList.add('active');
  render();
}

function resetFilter(){
  document.getElementById('fUniv').value='';
  document.getElementById('fType').value='';
  document.getElementById('fMonth').value='';
  document.getElementById('fSearch').value='';
  render();
}

function render(){
  const filtered=filterData();
  document.getElementById('fCount').textContent=filtered.length+'개';
  document.getElementById('rSummary').textContent=filtered.length+'개 전형';

  if(filtered.length===0){
    document.getElementById('container').innerHTML='<div class=no-result>검색 결과가 없습니다</div>';
    return;
  }

  if(currentView==='card') renderCard(filtered);
  else if(currentView==='table') renderTable(filtered);
  else renderTimeline(filtered);
}

function renderCard(items){
  let html='<div class=card-grid>';
  items.forEach(d=>{
    const wonser=fmtRange(d.원서접수_시작,d.원서접수_종료);
    const seoRyu=fmtRange(d.서류제출_시작,d.서류제출_종료);
    const silgi=d.실기날짜&&d.실기날짜!=='미정'?fmt(d.실기날짜)+(d.실기시간_시작?' '+d.실기시간_시작:''):null;
    const myeon=d.면접날짜&&d.면접날짜!=='미정'?fmt(d.면접날짜)+(d.면접시간_시작?' '+d.면접시간_시작:''):null;
    const dan1=fmt(d['1단계발표일']);
    const balpyo=fmt(d.최종발표일);
    const deungnok=fmtRange(d.등록_시작,d.등록_종료);
    const chunwon=fmtRange(d.충원발표_시작,d.충원발표_종료);

    html+=`<div class=sched-card>
      <div class=sc-head>
        <div>
          <div class=sc-univ>${d.대학명}</div>
          <div class=sc-jeonhyeong>${d.전형명||''}</div>
        </div>
        ${d.모집인원?`<div class=sc-count>${d.모집인원}명</div>`:''}
      </div>
      <div class=sc-dept>${d.모집단위}</div>
      <div class=sc-timeline>
        ${wonser?`<div class=sc-row><span class=sc-row-label>원서접수</span><span class="sc-row-val">${wonser}</span></div>`:''}
        ${seoRyu?`<div class=sc-row><span class=sc-row-label>서류제출</span><span class="sc-row-val">${seoRyu}</span></div>`:''}
        ${dan1?`<div class=sc-row><span class=sc-row-label>1단계발표</span><span class="sc-row-val">${dan1}</span></div>`:''}
        ${silgi?`<div class=sc-row><span class=sc-row-label>실기고사</span><span class="sc-row-val highlight">${silgi}</span></div>`:''}
        ${myeon?`<div class=sc-row><span class=sc-row-label>면접</span><span class="sc-row-val highlight">${myeon}</span></div>`:''}
        <div class=sc-divider></div>
        ${balpyo?`<div class=sc-row><span class=sc-row-label>최종발표</span><span class="sc-row-val">${balpyo}</span></div>`:''}
        ${deungnok?`<div class=sc-row><span class=sc-row-label>등록</span><span class="sc-row-val">${deungnok}</span></div>`:''}
        ${chunwon?`<div class=sc-row><span class=sc-row-label>충원발표</span><span class="sc-row-val">${chunwon}</span></div>`:''}
        ${d.비고?`<div class=sc-row><span class=sc-row-label>비고</span><span class="sc-row-val" style="color:var(--ink3);font-size:11px;line-height:1.6">${d.비고.slice(0,80)}${d.비고.length>80?'…':''}</span></div>`:''}
      </div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('container').innerHTML=html;
}

function renderTable(items){
  let html=`<div class=table-wrap><table>
    <thead><tr>
      <th>대학</th><th>전형명</th><th>모집단위</th><th>인원</th>
      <th>원서접수</th><th>실기고사</th><th>면접</th>
      <th>최종발표</th><th>등록</th><th>충원발표</th>
    </tr></thead><tbody>`;
  items.forEach(d=>{
    const wonser=fmtRange(d.원서접수_시작,d.원서접수_종료);
    const silgi=d.실기날짜&&d.실기날짜!=='미정'?fmt(d.실기날짜):null;
    const myeon=d.면접날짜&&d.면접날짜!=='미정'?fmt(d.면접날짜):null;
    const balpyo=fmt(d.최종발표일);
    const deungnok=fmtRange(d.등록_시작,d.등록_종료);
    const chunwon=fmtRange(d.충원발표_시작,d.충원발표_종료);
    html+=`<tr>
      <td class=td-univ>${d.대학명}</td>
      <td style="font-size:11px;color:var(--ink2)">${d.전형명||'-'}</td>
      <td class=td-dept>${d.모집단위}</td>
      <td style="text-align:center;color:var(--ink2)">${d.모집인원||'-'}</td>
      <td class=td-date>${wonser?`<span class="badge b-wonser">${wonser}</span>`:'<span style="color:var(--ink3)">-</span>'}</td>
      <td class=td-date>${silgi?`<span class="badge b-silgi">${silgi}</span>`:'<span style="color:var(--ink3)">-</span>'}</td>
      <td class=td-date>${myeon?`<span class="badge b-myeon">${myeon}</span>`:'<span style="color:var(--ink3)">-</span>'}</td>
      <td class=td-date>${balpyo?`<span class="badge b-balpyo">${balpyo}</span>`:'<span style="color:var(--ink3)">-</span>'}</td>
      <td class=td-date>${deungnok?`<span class="badge b-deungnok">${deungnok}</span>`:'<span style="color:var(--ink3)">-</span>'}</td>
      <td class=td-date>${chunwon?`<span class="badge b-chunwon">${chunwon}</span>`:'<span style="color:var(--ink3)">-</span>'}</td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  document.getElementById('container').innerHTML=html;
}

function renderTimeline(items){
  const type=document.getElementById('fType').value||'wonser';
  const typeLabel={wonser:'원서접수',silgi:'실기고사',myeon:'면접',balpyo:'합격자발표',deungnok:'등록',chunwon:'충원발표'};

  const groups={};
  items.forEach(d=>{
    const dt=getTypeDate(d,type);
    if(!dt||dt==='미정') return;
    if(!groups[dt]) groups[dt]=[];
    groups[dt].push(d);
  });

  const MONTH_KR={'09':'9월','10':'10월','11':'11월','12':'12월','01':'1월'};
  const monthGroups={};
  Object.keys(groups).sort().forEach(dt=>{
    const m=dt.slice(5,7);
    if(!monthGroups[m]) monthGroups[m]=[];
    monthGroups[m].push(dt);
  });

  let html='';
  Object.keys(monthGroups).sort().forEach(m=>{
    const dts=monthGroups[m];
    const total=dts.reduce((s,dt)=>s+groups[dt].length,0);
    html+=`<div class=timeline-month>
      <div class=timeline-month-label>${MONTH_KR[m]||m+'월'} <span>${total}개 일정</span></div>`;
    dts.forEach(dt=>{
      const dow=getDow(dt);
      const weekend=isWeekend(dt);
      html+=`<div class=timeline-day>
        <div class=timeline-day-label>
          ${fmt(dt)} <span class="dow${weekend?' weekend':''}">${dow}</span>
        </div>
        <div class=timeline-events>`;
      groups[dt].forEach(d=>{
        const time=type==='silgi'?d.실기시간_시작:type==='myeon'?d.면접시간_시작:null;
        html+=`<div class=tl-event>
          <div class=tl-event-type><span class="badge b-${type}">${typeLabel[type]}</span></div>
          <div>
            <div class=tl-event-univ>${d.대학명}</div>
            <div class=tl-event-dept>${d.모집단위}</div>
            ${time&&time!=='미정'?`<div class=tl-event-time>${time}</div>`:''}
          </div>
        </div>`;
      });
      html+='</div></div>';
    });
    html+='</div>';
  });

  if(!html) html='<div class=no-result>일정 유형을 선택해주세요</div>';
  document.getElementById('container').innerHTML=html;
}

render();
</script>
</body>
</html>
